<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Concreta</title>
    <script>
      // SPA redirect for GitHub Pages — encodes the path into the query string
      // so index.html can restore it via history.replaceState.
      // Segment count = 1 (repo name counts as one path segment).
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
