<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Concreta</title>
    <script>
      // SPA redirect for GitHub Pages — encodes the path into the query string
      // so index.html can restore it via history.replaceState.
      // pathSegmentsToKeep = 0: the app is served from the root of the custom
      // domain (concreta.tools), no repo-name prefix to preserve.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
